<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Exam Prep Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --cyan:         oklch(62% 0.17 200);
      --cyan-light:   oklch(94% 0.06 200);
      --cyan-glow:    oklch(62% 0.17 200 / 0.22);
      --cyan-hover:   oklch(56% 0.18 200);
      --teal:         oklch(58% 0.15 185);
      --mint:         oklch(93% 0.06 165);

      --bg:           #F4F8FB;
      --bg-mesh-a:    oklch(95% 0.025 210);
      --bg-mesh-b:    oklch(96% 0.020 165);

      --surface:      #ffffff;
      --surface-2:    oklch(97% 0.010 210);
      --border:       oklch(89% 0.015 210);

      --text:         oklch(20% 0.015 250);
      --text-muted:   oklch(46% 0.018 240);
      --text-faint:   oklch(64% 0.012 240);

      --shadow-sm:    0 1px 3px oklch(50% 0.04 220 / 0.08),
                      0 4px 12px oklch(50% 0.04 220 / 0.07);
      --shadow-card:  0 2px 8px oklch(45% 0.05 220 / 0.06),
                      0 12px 32px oklch(45% 0.05 220 / 0.10),
                      0 32px 64px oklch(45% 0.05 220 / 0.07);
      --shadow-hover: 0 4px 12px oklch(45% 0.06 220 / 0.10),
                      0 20px 48px oklch(45% 0.06 220 / 0.16),
                      0 0 0 1.5px oklch(62% 0.17 200 / 0.20);

      --radius:       20px;
      --radius-sm:    12px;
    }

    /* ── Base ── */
    html, body { min-height: 100%; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Airy mesh background ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 0%,    oklch(93% 0.04 200 / 0.7) 0%, transparent 65%),
        radial-gradient(ellipse 60% 45% at 85% 15%,   oklch(94% 0.04 165 / 0.6) 0%, transparent 65%),
        radial-gradient(ellipse 55% 40% at 10% 85%,   oklch(95% 0.03 185 / 0.5) 0%, transparent 60%),
        radial-gradient(ellipse 65% 50% at 90% 90%,   oklch(93% 0.035 210 / 0.5) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Subtle dot-grid texture ── */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, oklch(60% 0.04 210 / 0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Container ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 5rem 1.75rem 5.5rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--cyan-light);
      color: var(--cyan-hover);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      margin-bottom: 1.25rem;
      border: 1px solid oklch(62% 0.17 200 / 0.18);
    }

    .eyebrow-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    header h1 {
      font-size: clamp(2rem, 4.5vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 1rem;
    }

    header h1 span {
      color: var(--cyan);
    }

    header p {
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text-muted);
      max-width: 42rem;
      margin: 0 auto;
      line-height: 1.7;
      text-wrap: pretty;
    }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      margin-top: 2.25rem;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }

    .stat-value {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-faint);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stat-divider {
      width: 1px;
      height: 30px;
      background: var(--border);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      gap: 2rem;
      grid-template-columns: 1fr;
    }

    @media (min-width: 720px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1060px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-card);
      transition:
        transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1),
        border-color 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: oklch(62% 0.17 200 / 0.25);
    }

    /* ── Iframe preview (passive — untouched logic) ── */
    .preview {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--surface-2);
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    /* Frosted edge vignette */
    .preview::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 30px oklch(88% 0.02 210 / 0.5);
      pointer-events: none;
      z-index: 2;
    }

    .preview iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: 0;
      pointer-events: none;
      transform-origin: top left;
      /* width / height / transform set dynamically by JS */
    }

    /* Belt-and-suspenders transparent overlay */
    .preview .overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      cursor: pointer;
      z-index: 3;
      text-decoration: none;
    }

    .preview .overlay:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: -3px;
    }

    /* ── Card body ── */
    .card-body {
      padding: 1.5rem 1.5rem 1.75rem;
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      gap: 0.6rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-tag {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cyan-hover);
      background: var(--cyan-light);
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
    }

    .card-body h2 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.015em;
      line-height: 1.3;
      color: var(--text);
    }

    .card-body p {
      color: var(--text-muted);
      font-size: 0.865rem;
      font-weight: 400;
      line-height: 1.65;
      flex: 1 1 auto;
      text-wrap: pretty;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45em;
      width: 100%;
      text-align: center;
      background: var(--cyan);
      color: #fff;
      text-decoration: none;
      padding: 0.8rem 1.25rem;
      border-radius: var(--radius-sm);
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      letter-spacing: -0.005em;
      margin-top: 0.75rem;
      transition:
        background 0.2s ease,
        box-shadow 0.2s ease,
        transform 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    /* Shimmer highlight */
    .btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .btn-arrow {
      display: inline-block;
      transition: transform 0.2s ease;
      font-style: normal;
    }

    .btn:hover {
      background: var(--cyan-hover);
      box-shadow: 0 0 0 4px var(--cyan-glow), 0 6px 20px var(--cyan-glow);
      transform: translateY(-1px);
    }

    .btn:hover .btn-arrow { transform: translateX(4px); }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 0 0 2px var(--cyan-glow);
    }

    .btn:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 2px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 4rem;
      color: var(--text-faint);
      font-size: 0.8rem;
      font-weight: 400;
    }

    /* ── Entry animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header { animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both; }

    .card {
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .card:nth-child(1) { animation-delay: 0.10s; }
    .card:nth-child(2) { animation-delay: 0.18s; }
    .card:nth-child(3) { animation-delay: 0.26s; }

    /* ── Responsive tweaks ── */
    @media (max-width: 480px) {
      .container { padding: 3rem 1rem 4rem; }
      .stats { gap: 1.25rem; }
      .stat-divider { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        Active Recall Study Suite
      </div>
      <h1>Medical Exam<br /><span>Prep Portal</span></h1>
      <p>Active-recall tools for biochemistry &amp; cell biology mastery. Pick a module and start studying.</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-value">3</div>
          <div class="stat-label">Study Apps</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-value">13+</div>
          <div class="stat-label">Pathways</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-value">79</div>
          <div class="stat-label">Signal Nodes</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-value">20</div>
          <div class="stat-label">Amino Acids</div>
        </div>
      </div>
    </header>

    <main class="grid" id="appGrid" aria-label="Study apps"></main>

    <footer>
      <p>Click any preview or button to launch the full app in a new tab.</p>
    </footer>

  </div>

  <script>
    /* =========================================================
       To add a new app later, just push another object into
       this array. The card will render automatically.
       ========================================================= */
    const apps = [
      {
        title: "Biochemical Pathways Network",
        tag: "Metabolism",
        description:
          "A drag-and-drop pathway mapper that tests recall of enzymes, intermediates, and amino acids across 13 core biochemistry pathways — glycolysis, TCA, fatty acid synthesis, beta-oxidation, amino acid biosynthesis, and more. Spaced repetition prioritizes previously missed terms, generating custom occlusion challenges (3–6 blanks per round) that force you to reconstruct metabolic maps from memory.",
        url: "https://biochem-app.vercel.app/"
      },
      {
        title: "Amino Acid Profile Builder",
        tag: "Biochemistry",
        description:
          "Master all 20 standard amino acids by dragging 1-letter codes, hand-drawn side-chain structures, and pKr values into complete profiles, with spaced repetition surfacing your weakest amino acids for more practice. Study Mode groups them by biochemical family with expert memory hooks; Test Mode uses drag-and-drop active recall, and wrong answers instantly trigger review cards pairing correct structures with clinical mnemonics for USMLE board prep.",
        url: "https://amino-acid-profile-builder.vercel.app/"
      },
      {
        title: "Cascade — Cellular Signaling Pathways",
        tag: "Cell Biology",
        description:
          "An interactive tool covering five core pathways — GPCR, RTK, Cell Cycle, Cell Junctions &amp; ECM, and Apoptosis — rendered as multi-tier branching flowcharts where every node reveals a high-yield hint, memory metaphor, and clinical correlate. Drag labeled tiles onto live pathway maps, with error-tracking that surfaces weak nodes more often each round, plus four overlay toggles for drug targets, clinical syndromes, inhibitory edges, and character-metaphor hooks across all 79 components.",
        url: "https://cellular-pathways-app.vercel.app/"
      }
      // 👉 Add more apps here, e.g.:
      // { title: "...", description: "...", url: "https://your-next-app.vercel.app/" }
    ];

    /* ── Render cards ── */
    const grid = document.getElementById("appGrid");

    apps.forEach((app) => {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <div class="preview">
          <iframe
            src="${app.url}"
            loading="lazy"
            title="${app.title} preview"
            sandbox="allow-scripts allow-same-origin"
            aria-hidden="true"
          ></iframe>
          <a
            class="overlay"
            href="${app.url}"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Launch ${app.title} in a new tab"
          ></a>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <span class="card-tag">${app.tag ?? "Study Module"}</span>
          </div>
          <h2>${app.title}</h2>
          <p>${app.description}</p>
          <a class="btn" href="${app.url}" target="_blank" rel="noopener noreferrer">
            Launch App <span class="btn-arrow">→</span>
          </a>
        </div>
      `;
      grid.appendChild(card);
    });

    /* ── Desktop-scale iframe trick ──────────────────────────────
       Sets each iframe to a full desktop width (1280px), then
       scales it down via CSS transform to fill the preview
       container — so apps render in desktop mode, not mobile.
       ResizeObserver keeps it correct as the layout reflows.
    ─────────────────────────────────────────────────────────── */
    const IFRAME_NATIVE_WIDTH = 1280;
    const IFRAME_NATIVE_HEIGHT = Math.round(IFRAME_NATIVE_WIDTH * 9 / 16); // 720

    function scaleIframe(preview) {
      const iframe = preview.querySelector("iframe");
      if (!iframe) return;
      const containerW = preview.offsetWidth;
      const scale = containerW / IFRAME_NATIVE_WIDTH;
      iframe.style.width  = IFRAME_NATIVE_WIDTH  + "px";
      iframe.style.height = IFRAME_NATIVE_HEIGHT + "px";
      iframe.style.transform = `scale(${scale})`;
    }

    function scaleAll() {
      document.querySelectorAll(".preview").forEach(scaleIframe);
    }

    // Initial scale after first paint
    requestAnimationFrame(scaleAll);

    // Re-scale on window resize
    window.addEventListener("resize", scaleAll);

    // Also watch individual preview containers via ResizeObserver
    if (window.ResizeObserver) {
      const ro = new ResizeObserver(entries => {
        entries.forEach(entry => scaleIframe(entry.target));
      });
      document.querySelectorAll(".preview").forEach(p => ro.observe(p));
    }
  </script>
</body>
</html>
